<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayTrack - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            /* Override overflow hidden from style.css just in case, though login fits */
            overflow-y: auto;
        }

        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            /* Inherits .card styles from style.css */
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            color: var(--accent);
            margin: 0;
            font-size: 32px;
        }

        .login-header p {
            color: var(--text-secondary);
            margin-top: 10px;
        }

        .error-msg {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            text-align: center;
            margin-bottom: 1rem;
            padding: 10px;
            border-radius: 8px;
            display: none;
            border: 1px solid var(--danger);
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="card login-card">
            <div class="login-header">
                <h1>PayTrack</h1>
                <p>Acesso Administrativo</p>
            </div>

            <div id="error-msg" class="error-msg"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" name="username" required placeholder="admin">
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" required placeholder="••••••">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Entrar</button>

                <div
                    style="margin-top: 25px; text-align: center; border-top: 1px solid var(--border); padding-top: 20px;">
                    <a href="store.html"
                        style="color: var(--accent); text-decoration: none; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 8px;">
                        🛍️ Acessar Loja (Cliente)
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('paytrack_token', data.token);
                    localStorage.setItem('paytrack_user', data.username);
                    window.location.href = 'index.html';
                } else {
                    errorDiv.innerText = data.error || 'Erro no login';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                console.error(err);
                errorDiv.innerText = 'Erro de conexão';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>

</html>
